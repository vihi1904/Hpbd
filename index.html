<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Happy Birthday 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Press Start 2P', cursive;
}

body{
  background:black;
  color:white;
  overflow:hidden;
  text-align:center;
}

/* ===== BACKGROUND TEXT ===== */
#bg-text{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:-1;
  overflow:hidden;
}

.fall-text{
  position:absolute;
  font-size:14px;
  white-space:nowrap;
  animation:fall linear infinite;
  opacity:0.8;
  text-shadow:0 0 10px pink,0 0 20px hotpink;
}

@keyframes fall{
  0%{transform:translateY(-100px);}
  100%{transform:translateY(110vh);}
}

/* ===== SCREEN ===== */
.screen{
  position:absolute;
  width:100%;
  height:100%;
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  padding:20px;
}

.active{
  display:flex;
}

button{
  padding:15px 30px;
  font-size:12px;
  border-radius:10px;
  border:none;
  background:#ff4b5c;
  color:white;
  cursor:pointer;
  margin-top:20px;
}

h1{
  font-size:18px;
  line-height:1.8;
  max-width:90%;
}

/* hearts */
.heart{
  position:absolute;
  color:pink;
  animation:fly 6s linear infinite;
}

@keyframes fly{
  0%{transform:translateY(0);}
  100%{transform:translateY(-900px);}
}

/* MUSIC BUTTON */
.music-btn{
  position:fixed;
  bottom:20px;
  right:20px;
  font-size:10px;
}

/* ===== THƯ ===== */
.letter-box{
  background:#111;
  padding:30px;
  border-radius:20px;
  max-width:80%;
  line-height:1.8;
  font-size:14px;
  color:pink;
  box-shadow:0 0 20px hotpink;
  font-family:'Be Vietnam Pro', sans-serif;
}
</style>
</head>

<body>

<div id="bg-text"></div>

<!-- SCREEN 1 -->
<div id="s1" class="screen active">
  <h1>
    Chuc mung sinh nhat nam 21 tuoi cua chi nhoaa 💖
    <br><br>
    *khong tin luon a =))*
  </h1>

  <button onclick="go(2)">==></button>
</div>

<!-- SCREEN 2 -->
<div id="s2" class="screen">
  <h1>
    Nho an uong đung bua,
    ngu đu giac,
    đung thuc khuya qua nhen 💖
    <br><br>
    Bot buon lai đo.
  </h1>

  <button onclick="start()">Tiep nee ✨</button>
</div>

<!-- SCREEN 3 -->
<div id="s3" class="screen">
  <h1>
    Di đuong can than ne,
    Ve nha an toan khong bo be chinh minh nua,
    Va nhat đinh phai that hanh phuc nhe,
  </h1>
</div>

<!-- MUSIC -->
<audio id="music" autoplay loop>
  <source src="nhac.mp3" type="audio/mpeg">
</audio>

<button class="music-btn" onclick="toggleMusic()">
  🎵 MUSIC
</button>

<!-- CONFETTI -->
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>

/* CHUYỂN SCREEN */
function go(n){
  document.querySelectorAll('.screen')
  .forEach(s=>s.classList.remove('active'));

  document.getElementById('s'+n)
  .classList.add('active');
}

/* START */
function start(){

  playMusic();

  go(3);

  confetti();

  hearts();
}

/* MUSIC */
let isPlaying=false;

function playMusic(){
  const music=document.getElementById("music");

  music.play()
  .then(()=>{
    isPlaying=true;
  })
  .catch(()=>{});
}

function toggleMusic(){

  let music=document.getElementById("music");

  if(isPlaying){
    music.pause();
  }else{
    music.play();
  }

  isPlaying=!isPlaying;
}

/* TỰ PHÁT NHẠC KHI VỪA CHẠM */
document.addEventListener("click", function(){
  playMusic();
}, { once:true });

/* HEARTS */
function hearts(){

  setInterval(()=>{

    let h=document.createElement("div");

    h.className="heart";

    h.innerHTML="💖";

    h.style.left=Math.random()*100+"vw";

    h.style.fontSize=
      (20+Math.random()*30)+"px";

    document.body.appendChild(h);

    setTimeout(()=>{
      h.remove();
    },6000);

  },300);
}

/* BACKGROUND TEXT */
function createFallingText(){

  const container=
    document.getElementById("bg-text");

  setInterval(()=>{

    for(let i=0;i<3;i++){

      const text=
        document.createElement("div");

      text.className="fall-text";

      const words=[
        "HAPPY BIRTHDAY",
        "💖",
        "THUY MI"
      ];

      text.innerText=
        words[Math.floor(Math.random()*words.length)];

      text.style.left=
        Math.random()*100+"vw";

      text.style.animationDuration=
        (3+Math.random()*5)+"s";

      text.style.color=
        `hsl(${Math.random()*360},100%,70%)`;

      container.appendChild(text);

      setTimeout(()=>{
        text.remove();
      },8000);
    }

  },80);
}

createFallingText();

</script>

</body>
</html>
